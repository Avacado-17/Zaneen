<svg width="64" height="64" viewBox="-100 -100 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="zaneen-bg-grad" x1="-100" y1="-100" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fcf6f0" />
      <stop offset="100%" stop-color="#f3e4d8" />
    </linearGradient>
    <linearGradient id="zaneen-ribbon-grad" x1="-50" y1="-80" x2="50" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c47a4c" />
      <stop offset="35%" stop-color="#8d4b26" />
      <stop offset="70%" stop-color="#5d2c12" />
      <stop offset="100%" stop-color="#3b1706" />
    </linearGradient>
    <linearGradient id="zaneen-highlight-grad" x1="-30" y1="-90" x2="30" y2="-40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e2a783" stop-opacity="0.9" />
      <stop offset="50%" stop-color="#b67148" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#5d2c12" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="zaneen-shadow" cx="0" cy="0" r="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
      </radialGradient>
  </defs>

  <!-- Circular background badge for maximum visibility in browser tab headers -->
  <circle cx="0" cy="0" r="92" fill="url(#zaneen-bg-grad)" stroke="#8d4b26" stroke-width="6" />

  <ellipse cx="0" cy="75" rx="45" ry="8" fill="url(#zaneen-shadow)" opacity="0.3" />

  <!-- 6 Petals -->
  <g transform="rotate(0)">
    <path d="M 0,-14 C -22,-20 -44,-42 -32,-70 C -20,-98 20,-98 32,-70 C 44,-42 22,-20 0,-14 Z" fill="url(#zaneen-ribbon-grad)" />
    <path d="M -22,-55 C -15,-80 15,-80 22,-55" stroke="url(#zaneen-highlight-grad)" stroke-width="5" stroke-linecap="round" fill="none" />
  </g>
  <g transform="rotate(60)">
    <path d="M 0,-14 C -22,-20 -44,-42 -32,-70 C -20,-98 20,-98 32,-70 C 44,-42 22,-20 0,-14 Z" fill="url(#zaneen-ribbon-grad)" />
    <path d="M -22,-55 C -15,-80 15,-80 22,-55" stroke="url(#zaneen-highlight-grad)" stroke-width="5" stroke-linecap="round" fill="none" />
  </g>
  <g transform="rotate(120)">
    <path d="M 0,-14 C -22,-20 -44,-42 -32,-70 C -20,-98 20,-98 32,-70 C 44,-42 22,-20 0,-14 Z" fill="url(#zaneen-ribbon-grad)" />
    <path d="M -22,-55 C -15,-80 15,-80 22,-55" stroke="url(#zaneen-highlight-grad)" stroke-width="5" stroke-linecap="round" fill="none" />
    </g>
  <g transform="rotate(180)">
    <path d="M 0,-14 C -22,-20 -44,-42 -32,-70 C -20,-98 20,-98 32,-70 C 44,-42 22,-20 0,-14 Z" fill="url(#zaneen-ribbon-grad)" />
    <path d="M -22,-55 C -15,-80 15,-80 22,-55" stroke="url(#zaneen-highlight-grad)" stroke-width="5" stroke-linecap="round" fill="none" />
  </g>
  <g transform="rotate(240)">
    <path d="M 0,-14 C -22,-20 -44,-42 -32,-70 C -20,-98 20,-98 32,-70 C 44,-42 22,-20 0,-14 Z" fill="url(#zaneen-ribbon-grad)" />
    <path d="M -22,-55 C -15,-80 15,-80 22,-55" stroke="url(#zaneen-highlight-grad)" stroke-width="5" stroke-linecap="round" fill="none" />
  </g>
  <g transform="rotate(300)">
    <path d="M 0,-14 C -22,-20 -44,-42 -32,-70 C -20,-98 20,-98 32,-70 C 44,-42 22,-20 0,-14 Z" fill="url(#zaneen-ribbon-grad)" />
    <path d="M -22,-55 C -15,-80 15,-80 22,-55" stroke="url(#zaneen-highlight-grad)" stroke-width="5" stroke-linecap="round" fill="none" />
  </g>
  <polygon points="0,-12 10.39,-6 10.39,6 0,12 -10.39,6 -10.39,-6" fill="#3b1706" opacity="0.3" />
</svg>
